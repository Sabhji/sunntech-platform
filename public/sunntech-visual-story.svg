<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="500" height="150">
  <defs>
    <!-- Storytelling Gradients -->
    <linearGradient id="story1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FA709A"/>
      <stop offset="50%" style="stop-color:#FEE140"/>
      <stop offset="100%" style="stop-color:#FA709A"/>
    </linearGradient>
    
    <linearGradient id="story2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#30CFD0"/>
      <stop offset="50%" style="stop-color:#330867"/>
      <stop offset="100%" style="stop-color:#30CFD0"/>
    </linearGradient>
    
    <!-- Depth Effect -->
    <filter id="storyDepth">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Glow Effect -->
    <filter id="storyGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Warm, Inviting Background -->
  <rect width="500" height="150" fill="#FFF9F0"/>
  
  <!-- The Visual Story: Two Hands Connecting -->
  <g transform="translate(25, 25)">
    <!-- Left Hand (Talent) -->
    <path d="M10 40 Q15 20 30 15 Q45 10 55 20 Q60 30 55 45 Q50 60 35 65 Q20 70 10 55 Q5 45 10 40" 
          fill="none" stroke="url(#story1)" stroke-width="4" stroke-linecap="round" filter="url(#storyDepth)"/>
    
    <!-- Right Hand (Security) -->
    <path d="M90 40 Q85 20 70 15 Q55 10 45 20 Q40 30 45 45 Q50 60 65 65 Q80 70 90 55 Q95 45 90 40" 
          fill="none" stroke="url(#story2)" stroke-width="4" stroke-linecap="round" filter="url(#storyDepth)"/>
    
    <!-- The Connection Point - Where Magic Happens -->
    <circle cx="50" cy="40" r="15" fill="url(#story1)" opacity="0.3"/>
    <circle cx="50" cy="40" r="10" fill="url(#story2)" opacity="0.5"/>
    <circle cx="50" cy="40" r="5" fill="#FFFFFF" filter="url(#storyGlow)"/>
    
    <!-- Sparkles at Connection Point -->
    <g fill="#FEE140">
      <circle cx="45" cy="35" r="2" opacity="0.8"/>
      <circle cx="55" cy="35" r="1.5" opacity="0.6"/>
      <circle cx="50" cy="30" r="2" opacity="0.7"/>
      <circle cx="42" cy="42" r="1" opacity="0.5"/>
      <circle cx="58" cy="42" r="1.5" opacity="0.6"/>
    </g>
    
    <!-- Energy Lines Radiating from Connection -->
    <g stroke="url(#story1)" stroke-width="1.5" opacity="0.4">
      <line x1="50" y1="25" x2="50" y2="5"/>
      <line x1="35" y1="40" x2="20" y2="40"/>
      <line x1="65" y1="40" x2="80" y2="40"/>
      <line x1="50" y1="55" x2="50" y2="75"/>
    </g>
  </g>
  
  <!-- Typography with Emotional Connection -->
  <g transform="translate(130, 55)">
    <!-- SUNN - Warm, Human Colors -->
    <text x="0" y="0" font-family="Georgia, serif" font-size="52" font-weight="bold" font-style="italic">
      <tspan fill="url(#story1)">S</tspan><tspan fill="#FA709A">U</tspan><tspan fill="#FEE140">N</tspan><tspan fill="url(#story1)">N</tspan>
    </text>
    
    <!-- TECH - Trust, Security Colors -->
    <text x="130" y="0" font-family="Georgia, serif" font-size="52" font-weight="bold" font-style="italic">
      <tspan fill="url(#story2)">T</tspan><tspan fill="#30CFD0">E</tspan><tspan fill="#330867">C</tspan><tspan fill="url(#story2)">H</tspan>
    </text>
  </g>
  
  <!-- Slogan as Emotional Promise -->
  <g transform="translate(130, 95)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="18" fill="#330867" font-weight="500">
      Where talent meets trust
    </text>
    
    <!-- Decorative underline with meaning -->
    <path d="M0 10 Q100 15 200 10 Q300 5 350 10" 
          fill="none" stroke="url(#story1)" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Visual Story Elements - The Journey -->
  <g transform="translate(400, 25)">
    <!-- Small dots representing the journey -->
    <circle cx="20" cy="10" r="4" fill="#FA709A" opacity="0.6"/>
    <circle cx="35" cy="25" r="3" fill="#FEE140" opacity="0.7"/>
    <circle cx="50" cy="40" r="5" fill="#30CFD0" opacity="0.8"/>
    <circle cx="35" cy="55" r="3" fill="#330867" opacity="0.6"/>
    <circle cx="20" cy="70" r="4" fill="#FA709A" opacity="0.7"/>
    
    <!-- Connecting the journey -->
    <path d="M20 10 Q35 25 50 40 Q35 55 20 70" 
          fill="none" stroke="url(#story2)" stroke-width="1.5" stroke-dasharray="4,4"/>
  </g>
  
  <!-- Warm Corner Accents -->
  <g opacity="0.5">
    <path d="M10 10 L10 20 L20 10" fill="none" stroke="#FA709A" stroke-width="2"/>
    <path d="M490 10 L490 20 L480 10" fill="none" stroke="#FEE140" stroke-width="2"/>
    <path d="M10 140 L10 130 L20 140" fill="none" stroke="#30CFD0" stroke-width="2"/>
    <path d="M490 140 L490 130 L480 140" fill="none" stroke="#330867" stroke-width="2"/>
  </g>
</svg>
